---
# Minimal agent-sandbox CRDs for testing Sympozium integration.
# In production, install from: https://github.com/kubernetes-sigs/agent-sandbox/releases
#
# WARNING: These use the v1alpha1 API group "agents.x-k8s.io". When the
# upstream project graduates (v1beta1, v1), update the group/version here
# AND in internal/controller/agentrun_sandbox.go (see the full list there).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.agents.x-k8s.io
spec:
  group: agents.x-k8s.io
  names:
    kind: Sandbox
    listKind: SandboxList
    plural: sandboxes
    singular: sandbox
    shortNames: [sandbox]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                replicas:
                  type: integer
                selector:
                  type: string
                service:
                  type: string
                serviceFQDN:
                  type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxclaims.agents.x-k8s.io
spec:
  group: agents.x-k8s.io
  names:
    kind: SandboxClaim
    listKind: SandboxClaimList
    plural: sandboxclaims
    singular: sandboxclaim
    shortNames: [sbc]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                sandboxName:
                  type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxwarmpools.agents.x-k8s.io
spec:
  group: agents.x-k8s.io
  names:
    kind: SandboxWarmPool
    listKind: SandboxWarmPoolList
    plural: sandboxwarmpools
    singular: sandboxwarmpool
    shortNames: [swp]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                readyCount:
                  type: integer
                totalCount:
                  type: integer
