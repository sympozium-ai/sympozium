---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
    helm.sh/resource-policy: keep
  name: models.sympozium.ai
spec:
  group: sympozium.ai
  names:
    kind: Model
    listKind: ModelList
    plural: models
    singular: model
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.inference.serverType
      name: Server
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .spec.resources.gpu
      name: GPU
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Model is the Schema for the models API.
          A Model declares a model to be served via an inference server (llama-server,
          vLLM, TGI, or custom) and exposed as an OpenAI-compatible endpoint.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelCRDSpec defines the desired state of a Model.
              A Model declares a model to be served via an inference server (llama-server,
              vLLM, TGI, or custom) and exposed as an OpenAI-compatible endpoint.
            properties:
              inference:
                description: Inference configures the inference server.
                properties:
                  args:
                    description: Args are additional command-line arguments for the
                      inference server.
                    items:
                      type: string
                    type: array
                  contextSize:
                    default: 4096
                    description: |-
                      ContextSize is the maximum context window size in tokens.
                      Maps to --ctx-size (llama-cpp), --max-model-len (vllm), or --max-input-length (tgi).
                    type: integer
                  env:
                    description: Env are additional environment variables for the
                      inference server container.
                    items:
                      description: EnvVar represents an environment variable present
                        in a Container.
                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap or its
                                    key must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                            fieldRef:
                              description: |-
                                Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                              properties:
                                apiVersion:
                                  description: Version of the schema the FieldPath
                                    is written in terms of, defaults to "v1".
                                  type: string
                                fieldPath:
                                  description: Path of the field to select in the
                                    specified API version.
                                  type: string
                              required:
                              - fieldPath
                              type: object
                              x-kubernetes-map-type: atomic
                            fileKeyRef:
                              description: |-
                                FileKeyRef selects a key of the env file.
                                Requires the EnvFiles feature gate to be enabled.
                              properties:
                                key:
                                  description: |-
                                    The key within the env file. An invalid key will prevent the pod from starting.
                                    The keys defined within a source may consist of any printable ASCII characters except '='.
                                    During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                  type: string
                                optional:
                                  default: false
                                  description: |-
                                    Specify whether the file or its key must be defined. If the file or key
                                    does not exist, then the env var is not published.
                                    If optional is set to true and the specified key does not exist,
                                    the environment variable will not be set in the Pod's containers.

                                    If optional is set to false and the specified key does not exist,
                                    an error will be returned during Pod creation.
                                  type: boolean
                                path:
                                  description: |-
                                    The path within the volume from which to select the file.
                                    Must be relative and may not contain the '..' path or start with '..'.
                                  type: string
                                volumeName:
                                  description: The name of the volume mount containing
                                    the env file.
                                  type: string
                              required:
                              - key
                              - path
                              - volumeName
                              type: object
                              x-kubernetes-map-type: atomic
                            resourceFieldRef:
                              description: |-
                                Selects a resource of the container: only resources limits and requests
                                (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                              properties:
                                containerName:
                                  description: 'Container name: required for volumes,
                                    optional for env vars'
                                  type: string
                                divisor:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: Specifies the output format of the
                                    exposed resources, defaults to "1"
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                resource:
                                  description: 'Required: resource to select'
                                  type: string
                              required:
                              - resource
                              type: object
                              x-kubernetes-map-type: atomic
                            secretKeyRef:
                              description: Selects a key of a secret in the pod's
                                namespace
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  huggingFaceTokenSecret:
                    description: |-
                      HuggingFaceTokenSecret references a Secret containing a HuggingFace API token.
                      The controller mounts the "token" key as the HF_TOKEN environment variable,
                      allowing vllm and tgi to access gated models (e.g. Llama, Mistral).
                    type: string
                  image:
                    description: |-
                      Image is the container image for the inference server.
                      Defaults vary by serverType: llama-cpp uses ghcr.io/ggml-org/llama.cpp:server,
                      vllm uses vllm/vllm-openai:latest, tgi uses ghcr.io/huggingface/text-generation-inference:latest.
                    type: string
                  port:
                    description: |-
                      Port is the inference server listen port.
                      Defaults: llama-cpp=8080, vllm=8000, tgi=8080.
                    format: int32
                    type: integer
                  serverType:
                    default: llama-cpp
                    description: |-
                      ServerType selects the inference server backend.
                      Defaults to "llama-cpp" for backward compatibility.
                    enum:
                    - llama-cpp
                    - vllm
                    - tgi
                    - custom
                    type: string
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector constrains the inference server to nodes
                  with matching labels.
                type: object
              placement:
                description: Placement configures how the controller selects a node
                  for the model.
                properties:
                  mode:
                    default: manual
                    description: |-
                      Mode is "auto" or "manual". In auto mode the controller uses llmfit
                      probes to select the best-fit node. Defaults to "manual".
                    enum:
                    - auto
                    - manual
                    type: string
                type: object
              resources:
                description: Resources defines compute requirements for the inference
                  server.
                properties:
                  cpu:
                    default: "4"
                    description: CPU is the CPU request/limit for the inference container
                      (e.g. "4").
                    type: string
                  gpu:
                    default: 0
                    description: |-
                      GPU is the number of GPUs to request (nvidia.com/gpu).
                      Set to 0 for CPU-only inference. Defaults to 0.
                    type: integer
                  memory:
                    default: 16Gi
                    description: Memory is the memory request/limit for the inference
                      container (e.g. "16Gi").
                    type: string
                type: object
              source:
                description: Source defines where to obtain the model weights.
                properties:
                  filename:
                    default: model.gguf
                    description: Filename is the target filename on the PVC.
                    type: string
                  modelID:
                    description: |-
                      ModelID is a HuggingFace model identifier
                      (e.g. "meta-llama/Llama-3.1-8B-Instruct").
                      Required for vllm and tgi server types. These servers pull
                      directly from HuggingFace at container startup.
                    type: string
                  url:
                    description: |-
                      URL is the download URL for a model file (e.g. GGUF).
                      Required when serverType is "llama-cpp" or unset.
                    type: string
                type: object
              storage:
                description: Storage configures the PersistentVolumeClaim for model
                  weights.
                properties:
                  size:
                    default: 10Gi
                    description: Size is the PVC storage size (e.g. "10Gi").
                    type: string
                  storageClass:
                    description: StorageClass is the PVC storage class. Empty uses
                      the cluster default.
                    type: string
                type: object
              tolerations:
                description: Tolerations for the inference server pod.
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
            required:
            - source
            type: object
          status:
            description: ModelStatus defines the observed state of a Model.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              endpoint:
                description: |-
                  Endpoint is the cluster-internal OpenAI-compatible API URL.
                  Populated when phase is Ready.
                type: string
              message:
                description: Message provides human-readable details about the current
                  phase.
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                type: string
              placedNode:
                description: |-
                  PlacedNode is the node selected by auto-placement. Populated when
                  placement mode is "auto" and placement succeeds.
                type: string
              placementMessage:
                description: PlacementMessage provides details about the placement
                  decision.
                type: string
              placementScore:
                description: PlacementScore is the llmfit fitness score for the selected
                  node.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
