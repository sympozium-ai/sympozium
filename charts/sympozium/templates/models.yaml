{{- if and .Values.models.enabled .Values.models.items }}
{{- range .Values.models.items }}
---
apiVersion: sympozium.ai/v1alpha1
kind: Model
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace | default "sympozium-system" }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/part-of: sympozium
spec:
  source:
    {{- if .url }}
    url: {{ .url | quote }}
    {{- end }}
    {{- if .modelID }}
    modelID: {{ .modelID | quote }}
    {{- end }}
    filename: {{ .filename | default "model.gguf" | quote }}
  storage:
    size: {{ .storageSize | default "10Gi" | quote }}
    {{- if .storageClass }}
    storageClass: {{ .storageClass | quote }}
    {{- end }}
  resources:
    {{- /* Use hasKey so an explicit gpu: 0 (CPU-only) is honoured; Sprig's
           `default` treats 0 as empty and would silently coerce it to 1. */}}
    gpu: {{ if hasKey . "gpu" }}{{ .gpu }}{{ else }}1{{ end }}
    memory: {{ .memory | default "16Gi" | quote }}
    cpu: {{ .cpu | default "4" | quote }}
  inference:
    {{- if .serverType }}
    serverType: {{ .serverType | quote }}
    {{- end }}
    {{- if .image }}
    image: {{ .image | quote }}
    {{- end }}
    {{- if .contextSize }}
    contextSize: {{ .contextSize }}
    {{- end }}
    {{- if .huggingFaceTokenSecret }}
    huggingFaceTokenSecret: {{ .huggingFaceTokenSecret | quote }}
    {{- end }}
    {{- if .args }}
    args:
    {{- range .args }}
      - {{ . | quote }}
    {{- end }}
    {{- end }}
  {{- if .nodeSelector }}
  nodeSelector:
    {{- toYaml .nodeSelector | nindent 4 }}
  {{- end }}
  {{- if .tolerations }}
  tolerations:
    {{- toYaml .tolerations | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
