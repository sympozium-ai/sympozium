{{- if .Values.networkPolicies.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-agent-deny-all
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/role: agent
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-agent-allow-eventbus
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/role: agent
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.nats.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    {{- else }}
    # External NATS — allow egress to any destination on port 4222
    - to: []
      ports:
        - protocol: TCP
          port: 4222
    {{- end }}
    # Allow HTTPS egress to cloud LLM providers (OpenAI, Anthropic, Azure, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow egress to cluster-local Model inference servers (llama-server)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: model
      ports:
        - protocol: TCP
          port: 8080
    # Allow Kubernetes API server (post-DNAT port on some CNIs like kube-router)
    - to: []
      ports:
        - protocol: TCP
          port: 6443
    {{- range .Values.networkPolicies.extraEgressPorts }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-sandbox-restricted
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/role: agent
      sympozium.ai/sandbox: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              sympozium.ai/role: agent
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-channel-deny-all
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/component: channel
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-channel-allow-egress
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/component: channel
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.nats.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    {{- else }}
    # External NATS — allow egress to any destination on port 4222
    - to: []
      ports:
        - protocol: TCP
          port: 4222
    {{- end }}
    # Allow HTTPS egress to channel platform APIs (Telegram, Slack, Discord, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HTTP for webhook callbacks
    - to: []
      ports:
        - protocol: TCP
          port: 80
    {{- range .Values.networkPolicies.extraEgressPorts }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-web-proxy-allow-ingress
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/component: web-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.nats.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    {{- else }}
    # External NATS — allow egress to any destination on port 4222
    - to: []
      ports:
        - protocol: TCP
          port: 4222
    {{- end }}
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- range .Values.networkPolicies.extraEgressPorts }}
    - ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
{{- end }}
{{- if and .Values.networkPolicies.enabled .Values.observability.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-allow-otel
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: sympozium
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
{{- end }}
