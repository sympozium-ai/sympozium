apiVersion: apps/v1
kind: Deployment
metadata:
  name: sympozium-apiserver
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  replicas: {{ .Values.apiserver.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: apiserver
  template:
    metadata:
      annotations:
        checksum/ui-token: {{ include (print $.Template.BasePath "/apiserver-ui-secret.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/component: apiserver
    spec:
      serviceAccountName: sympozium-apiserver
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: apiserver
          image: {{ include "sympozium.apiserverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --event-bus-url={{ include "sympozium.natsUrl" . }}
            - --token-file=/var/run/secrets/sympozium-ui-token/token
          {{- if .Values.apiserver.webUI.enabled }}
            - --serve-ui
          {{- end }}
          env:
          {{- if .Values.apiserver.webUI.token }}
            - name: SYMPOZIUM_UI_TOKEN
              value: {{ .Values.apiserver.webUI.token | quote }}
          {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SYMPOZIUM_COLLECTOR_METRICS_URL
              value: "http://sympozium-otel-collector.{{ include "sympozium.namespace" . }}.svc.cluster.local:{{ .Values.observability.collector.service.metricsPort }}/metrics"
          {{- if .Values.pricing.enabled }}
            - name: SYMPOZIUM_PRICING_CONFIGMAP
              value: "sympozium-model-pricing"
            - name: SYMPOZIUM_PRICING_NAMESPACE
              value: {{ include "sympozium.namespace" . | quote }}
          {{- end }}
          {{- if .Values.observability.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.observability.protocol | quote }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.observability.serviceNamePrefix }}-apiserver"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.observability.samplingRatio | quote }}
            - name: SYMPOZIUM_OTEL_BATCH_TIMEOUT
              value: {{ .Values.observability.apiServer.batchTimeout | quote }}
            {{- if .Values.observability.headers }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: {{ include "sympozium.otelHeaders" . | quote }}
            {{- end }}
            {{- if .Values.observability.resourceAttributes }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "sympozium.otelResourceAttrs" . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          resources:
            {{- toYaml .Values.apiserver.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if not .Values.apiserver.webUI.token }}
          volumeMounts:
            - name: sympozium-ui-token
              mountPath: /var/run/secrets/sympozium-ui-token
              readOnly: true
          {{- end }}
      {{- with .Values.apiserver.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiserver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiserver.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.apiserver.webUI.token }}
      volumes:
        - name: sympozium-ui-token
          secret:
            secretName: {{ include "sympozium.fullname" . }}-ui-token
            # 0444 (readable by all) is required because the apiserver runs
            # as non-root (distroless nonroot: UID 65532) and K8s Secret
            # volume mounts are owned by root. 0400 would only be readable
            # by root and the apiserver would 401 every request.
            defaultMode: 0444
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: sympozium-apiserver
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  selector:
    app.kubernetes.io/component: apiserver
  ports:
    - port: {{ .Values.apiserver.service.port }}
      targetPort: http
      protocol: TCP
      name: http
