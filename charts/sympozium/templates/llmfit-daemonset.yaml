{{- if .Values.llmfit.daemonset.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sympozium-llmfit-daemon
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: llmfit-daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: llmfit-daemon
      app.kubernetes.io/name: sympozium
  template:
    metadata:
      labels:
        {{- include "sympozium.labels" . | nindent 8 }}
        app.kubernetes.io/component: llmfit-daemon
    spec:
      serviceAccountName: sympozium-llmfit-daemon
      dnsPolicy: ClusterFirst
      {{- with .Values.llmfit.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llmfit.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llmfit.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: llmfit-daemon
          image: {{ include "sympozium.llmfitDaemonImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - llmfit
            - serve
            - --host
            - "0.0.0.0"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NATS_URL
              value: {{ include "sympozium.natsUrl" . }}
            - name: LLMFIT_EVENT_INTERVAL
              value: {{ .Values.llmfit.daemonset.eventInterval | quote }}
            - name: LLMFIT_HOST_PROC
              value: /host/proc
            - name: LLMFIT_HOST_SYS
              value: /host/sys
            - name: LLMFIT_HOST_DEV
              value: /host/dev
            - name: LLMFIT_HOST_UDEV
              value: /host/run/udev
          ports:
            - name: health
              containerPort: 8787
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.llmfit.daemonset.resources | nindent 12 }}
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["SYS_PTRACE"]
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-dev
              mountPath: /host/dev
              readOnly: true
            - name: host-udev
              mountPath: /host/run/udev
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-dev
          hostPath:
            path: /dev
        - name: host-udev
          hostPath:
            path: /run/udev
        - name: tmp
          emptyDir: {}
{{- end }}
