---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: models.sympozium.ai
spec:
  group: sympozium.ai
  names:
    kind: Model
    listKind: ModelList
    plural: models
    singular: model
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .spec.resources.gpu
      name: GPU
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Model is the Schema for the models API.
          A Model declares a GGUF model to be downloaded, served via llama-server,
          and exposed as an OpenAI-compatible inference endpoint within the cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelCRDSpec defines the desired state of a Model.
              A Model declares a GGUF model to be downloaded, served via llama-server,
              and exposed as an OpenAI-compatible endpoint within the cluster.
            properties:
              inference:
                description: Inference configures the inference server (llama-server).
                properties:
                  args:
                    description: Args are additional command-line arguments for the
                      inference server.
                    items:
                      type: string
                    type: array
                  contextSize:
                    default: 4096
                    description: ContextSize is the maximum context window size in
                      tokens.
                    type: integer
                  image:
                    default: ghcr.io/ggml-org/llama.cpp:server
                    description: Image is the llama-server container image.
                    type: string
                  port:
                    default: 8080
                    description: Port is the inference server listen port.
                    format: int32
                    type: integer
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector constrains the inference server to nodes
                  with matching labels.
                type: object
              resources:
                description: Resources defines compute requirements for the inference
                  server.
                properties:
                  cpu:
                    default: "4"
                    description: CPU is the CPU request/limit for the inference container
                      (e.g. "4").
                    type: string
                  gpu:
                    default: 0
                    description: |-
                      GPU is the number of GPUs to request (nvidia.com/gpu).
                      Set to 0 for CPU-only inference. Defaults to 0.
                    type: integer
                  memory:
                    default: 16Gi
                    description: Memory is the memory request/limit for the inference
                      container (e.g. "16Gi").
                    type: string
                type: object
              source:
                description: Source defines where to obtain the model weights.
                properties:
                  filename:
                    default: model.gguf
                    description: Filename is the target filename on the PVC.
                    type: string
                  url:
                    description: URL is the download URL for the GGUF model file.
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              storage:
                description: Storage configures the PersistentVolumeClaim for model
                  weights.
                properties:
                  size:
                    default: 10Gi
                    description: Size is the PVC storage size (e.g. "10Gi").
                    type: string
                  storageClass:
                    description: StorageClass is the PVC storage class. Empty uses
                      the cluster default.
                    type: string
                type: object
              tolerations:
                description: Tolerations for the inference server pod.
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
            required:
            - source
            type: object
          status:
            description: ModelStatus defines the observed state of a Model.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              endpoint:
                description: |-
                  Endpoint is the cluster-internal OpenAI-compatible API URL.
                  Populated when phase is Ready.
                type: string
              message:
                description: Message provides human-readable details about the current
                  phase.
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
