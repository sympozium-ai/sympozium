---
# System Canary — validates end-to-end platform health on a schedule.
# Managed by the SympoziumConfigReconciler when canary.enabled is true.
#
# In canary mode, the agent-runner skips the LLM conversation loop and
# runs built-in Go health checks instead:
#   - API Server reachability
#   - Cluster info (node count)
#   - Kubernetes API access (nodes, schedules, MCP servers)
#   - LLM provider connectivity (one minimal chat call)
#
# The result is structured JSON, not LLM-generated markdown.
apiVersion: sympozium.ai/v1alpha1
kind: Ensemble
metadata:
  name: system-canary
  namespace: sympozium-system
  labels:
    sympozium.ai/canary: "true"
    app.kubernetes.io/managed-by: sympozium-config
spec:
  description: "System health canary — validates end-to-end platform health on a schedule."
  category: platform
  version: "1.0.0"
  workflowType: autonomous
  agentConfigs:
    - name: canary
      displayName: "System Canary"
      systemPrompt: "System canary health check"
      schedule:
        type: heartbeat
        interval: "30m"
        task: "canary"
