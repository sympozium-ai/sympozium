---
# Example Agent with Telegram and Slack channels
apiVersion: sympozium.ai/v1alpha1
kind: Agent
metadata:
  name: alice
  namespace: default
spec:
  channels:
    - type: telegram
      configRef:
        secret: alice-telegram-secret
    - type: slack
      configRef:
        secret: alice-slack-secret
  agents:
    default:
      model: gpt-4o
      sandbox:
        enabled: true
        image: ghcr.io/sympozium-ai/sympozium/sandbox:latest
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
      subagents:
        maxDepth: 3
        maxConcurrent: 5
  skills:
    - skillPackRef: k8s-ops
    - skillPackRef: code-review
  policyRef: default-policy
  authRefs:
    - provider: github
      secret: alice-github-token
    - provider: openai
      secret: alice-openai-key
  observability:
    enabled: true
    otlpEndpoint: otel-collector.observability.svc:4317
    otlpProtocol: grpc
    serviceName: sympozium
    resourceAttributes:
      deployment.environment: production
      k8s.cluster.name: my-cluster
