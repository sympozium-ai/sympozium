---
# Example AgentRun - Trigger a single agent run with a specific task
# Apply: kubectl apply -f agentrun-example.yaml
# Watch progress: kubectl get agentrun alice-run-001 -w
# View results: kubectl get agentrun alice-run-001 -o yaml
# Prerequisites: Agent "alice" must exist (see agent-example.yaml) and the
# secret "alice-openai-key" must contain OPENAI_API_KEY.
apiVersion: sympozium.ai/v1alpha1
kind: AgentRun
metadata:
  name: alice-run-001
  namespace: default
spec:
  agentRef: alice
  agentId: primary
  sessionKey: "session-abc123"
  task: "Review the latest pull request and provide feedback on code quality"
  model:
    provider: openai
    model: gpt-4o
    authSecretRef: alice-openai-key
  sandbox:
    enabled: true
    image: ghcr.io/sympozium-ai/sympozium/sandbox:latest
  skills:
    - skillPackRef: code-review
  toolPolicy:
    allow:
      - read_file
      - list_directory
      - fetch_url
    deny:
      - execute_command
      - write_file
  timeout: "10m"
  cleanup: keep  # keep the pod for debugging; use "delete" (default) to clean up
