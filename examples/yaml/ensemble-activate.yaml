---
# How to Activate an Ensemble
# 
# Step 1: Apply the Ensemble (creates the definition)
#   kubectl apply -f ensemble-example.yaml
#
# Step 2: Wait for it to appear in Pending phase
#   kubectl get ensemble example-team -w
#
# Step 3: Activate via TUI (interactive wizard)
#   sympozium
#   - Navigate to Ensembles tab
#   - Press Enter on "example-team"
#   - Select your API key secret
#
# OR activate programmatically (headless/CI):
#   kubectl patch ensemble example-team --type=merge -p '{
#     "spec": {
#       "authRefs": [{"secret": "my-openai-key"}]
#     }
#   }'
#
# What gets created automatically:
# - Agents (one per persona)
# - SympoziumSchedules (heartbeat tasks)
# - ConfigMaps (seeded memory)
#
# View created resources:
#   kubectl get sympoziuminstance,sympoziumschedule -l sympozium.ai/ensemble=example-team
---
# Example: Quick activation via kubectl patch
apiVersion: sympozium.ai/v1alpha1
kind: Ensemble
metadata:
  name: quick-activate
  namespace: default
spec:
  description: "Quick activation example"
  category: custom
  version: "1.0.0"
  authRefs:
    - secret: my-openai-key
  policyRef: default-policy
  agentConfigs:
    - name: assistant
      displayName: "General Assistant"
      systemPrompt: |
        You are a helpful assistant. Help users with tasks, answer questions,
        and provide guidance.
      skills:
        - k8s-ops
      schedule:
        type: heartbeat
        interval: "1h"
        task: "Check in and review any pending tasks."
      memory:
        enabled: true
