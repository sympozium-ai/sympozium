---
# Example SympoziumPolicy - Define tool access rules for agents
# Apply: kubectl apply -f sympoziumpolicy-example.yaml
# Use in an Agent: policyRef: restrictive-policy
apiVersion: sympozium.ai/v1alpha1
kind: SympoziumPolicy
metadata:
  name: restrictive-policy
  namespace: default
spec:
  toolGating:
    defaultAction: deny
    rules:
      # Allow read-only operations
      - tool: read_file
        action: allow
      - tool: list_directory
        action: allow
      - tool: fetch_url
        action: allow
      # Require manual approval for destructive operations
      - tool: write_file
        action: ask
      - tool: execute_command
        action: ask
  sandboxPolicy:
    required: true
    defaultImage: ghcr.io/sympozium-ai/sympozium/sandbox:latest
